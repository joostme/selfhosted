services:
  booklore:
    image: grimmory/grimmory:v2.3.0
    container_name: booklore
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      - USER_ID=${PUID}
      - GROUP_ID=${PGID}
      - TZ
      - DATABASE_URL=jdbc:mariadb://mariadb:3306/booklore
      - DATABASE_USERNAME=booklore
      - DATABASE_PASSWORD
    volumes:
      - ${APPDATA_PATH}/booklore/data:/app/data
      - ${APPDATA_PATH}/booklore/books:/books
      - ${APPDATA_PATH}/booklore/bookdrop:/bookdrop
    restart: unless-stopped
    networks:
      - proxy
      - booklore
    labels:
      traefik.enable: true
      traefik.http.routers.booklore.tls: true
      traefik.http.routers.booklore.tls.certresolver: letsencrypt
      traefik.http.routers.booklore.rule: Host(`${SERVICE_URL}`)
      traefik.http.routers.booklore.entrypoints: websecure
      traefik.http.routers.booklore.service: booklore
      traefik.http.services.booklore.loadbalancer.server.port: 6060

      glance.name: Grimmory
      glance.icon: https://raw.githubusercontent.com/grimmory-tools/grimmory/develop/assets/logo.svg
      glance.url: https://${SERVICE_URL}
      net.unraid.docker.icon: https://raw.githubusercontent.com/grimmory-tools/grimmory/develop/assets/logo.svg
      net.unraid.docker.webui: https://${SERVICE_URL}

  mariadb:
    image: lscr.io/linuxserver/mariadb:11.4.10
    container_name: mariadb
    environment:
      - TZ
      - PUID
      - PGID
      - MYSQL_ROOT_PASSWORD=${DATABASE_PASSWORD}
      - MYSQL_DATABASE=booklore
      - MYSQL_USER=booklore
      - MYSQL_PASSWORD=${DATABASE_PASSWORD}
    volumes:
      - ${APPDATA_PATH}/booklore/mariadb/config:/config
    restart: unless-stopped
    networks:
      - booklore
    healthcheck:
      test: [ "CMD", "mariadb-admin", "ping", "-h", "localhost" ]
      interval: 5s
      timeout: 5s
      retries: 10

networks:
  proxy:
    external: true
  booklore:
    driver: bridge
    internal: true
        

services:
  opencode:
    image: ghcr.io/joostme/opencode-docker:1.0.1
    container_name: opencode
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ${APPDATA_PATH}/repos:/repos
      - ${APPDATA_PATH}/opencode/data:/home/opencode/.local/share/opencode
      - ${APPDATA_PATH}/opencode/config/opencode.json:/home/opencode/.config/opencode/opencode.json:ro
      - ${APPDATA_PATH}/opencode/skills:/home/opencode/.config/opencode/skills:ro
      - ${APPDATA_PATH}/.ssh:/home/opencode/.ssh-keys:ro
      - ${APPDATA_PATH}/opencode/config/mise.toml:/home/opencode/.config/mise/config.toml:ro
      - mise-data:/home/opencode/.local/share/mise
      - code-server-data:/home/opencode/.local/share/code-server
    networks:
      - proxy
    labels:
      traefik.enable: true
      traefik.http.routers.opencode.tls: true
      traefik.http.routers.opencode.tls.certresolver: letsencrypt
      traefik.http.routers.opencode.rule: Host(`${SERVICE_URL_OPENCODE}`)
      traefik.http.routers.opencode.entrypoints: websecure
      traefik.http.routers.opencode.service: opencode
      traefik.http.services.opencode.loadbalancer.server.port: 4096

      traefik.http.routers.code-server.tls: true
      traefik.http.routers.code-server.tls.certresolver: letsencrypt
      traefik.http.routers.code-server.rule: Host(`${SERVICE_URL_CODESERVER}`)
      traefik.http.routers.code-server.entrypoints: websecure
      traefik.http.routers.code-server.service: code-server
      traefik.http.services.code-server.loadbalancer.server.port: 8080

volumes:
  mise-data:
  code-server-data:

networks:
  proxy:
    external: true

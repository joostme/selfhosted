services:
  paperless:
    container_name: paperless
    image: ghcr.io/paperless-ngx/paperless-ngx:2.20.13
    restart: unless-stopped
    environment:
      - USERMAP_UID=${PUID}
      - USERMAP_GID=${PGID}
      - PAPERLESS_REDIS=redis://redis:6379
      - PAPERLESS_OCR_LANGUAGE=deu
      - PAPERLESS_TIME_ZONE=${TZ}
      - PAPERLESS_CONSUMER_ENABLE_BARCODES=1
      - PAPERLESS_CONSUMER_ENABLE_ASN_BARCODE=1
      - PAPERLESS_URL=https://${SERVICE_URL}
      - PAPERLESS_APPS=allauth.socialaccount.providers.openid_connect
      - PAPERLESS_SOCIAL_AUTO_SIGNUP=true
      - PAPERLESS_DISABLE_REGULAR_LOGIN=true
      - PAPERLESS_REDIRECT_LOGIN_TO_SSO=true
      - PAPERLESS_SOCIALACCOUNT_PROVIDERS=${OAUTH_PROVIDER}
      - PAPERLESS_SECRET_KEY
    volumes:
      - ${APPDATA_PATH}/paperless-ngx/data:/usr/src/paperless/data
      - ${MNT_PATH}/paperless/media:/usr/src/paperless/media
      - ${MNT_PATH}/paperless_consume/:/usr/src/paperless/consume
      - ${MNT_PATH}/paperless/export/:/usr/src/paperless/export
    networks:
      - proxy
      - redis_net
    labels:
      traefik.enable: true
      traefik.http.routers.paperless.tls: true
      traefik.http.routers.paperless.tls.certresolver: letsencrypt
      traefik.http.routers.paperless.rule: Host(`${SERVICE_URL}`)
      traefik.http.routers.paperless.entrypoints: websecure

      glance.name: Paperless
      glance.icon: sh:paperless-ngx
      glance.url: https://${SERVICE_URL}
      net.unraid.docker.icon: https://cdn.jsdelivr.net/gh/selfhst/icons/png/paperless-ngx.png
      net.unraid.docker.webui: https://${SERVICE_URL}
networks:
  proxy:
    external: true
  redis_net:
    external: true
